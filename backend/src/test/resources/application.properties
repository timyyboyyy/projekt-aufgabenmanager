# Test-Konfiguration: isolierte In-Memory-H2 (kein Datei-Zustand), fixes JWT-Secret.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false

# Festes Secret (>= 32 Bytes) fuer stabile Tokens in Integrationstests.
app.jwt.secret=test-secret-please-change-1234567890-abcdefghij
app.jwt.expiration-ms=3600000
