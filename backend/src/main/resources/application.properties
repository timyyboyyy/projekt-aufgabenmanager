spring.application.name=aufgabenmanager

# --- Datenbank: H2 im Datei-Modus (reproduzierbar, ohne Installation) ---
# Datei liegt unter backend/data/ (gitignored). AUTO_SERVER erlaubt parallelen Zugriff (z. B. H2-Konsole).
spring.datasource.url=jdbc:h2:file:./data/aufgabenmanager;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- H2-Konsole (nur fuer Entwicklung) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Server ---
server.port=8080

# --- JWT ---
# Secret NICHT hier setzen. Ueber Umgebungsvariable JWT_SECRET oder application-local.properties (gitignored).
# Siehe application-local.properties.example.
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=3600000

# --- PostgreSQL-Variante (fuer spaeteren Betrieb; in application-local.properties setzen) ---
